# Use the v1.3.0 group-by:file mode — scenarios appear under their
# sourceFile heading with priority badges per row, instead of grouped
# by must/should/nice. Better for code reviewers who think file-by-file.
name: QA Advisor (file-grouped)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  advise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: i-kosheliev/qa-advisor-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          group-by: file
