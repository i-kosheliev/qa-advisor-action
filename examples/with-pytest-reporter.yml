# Python tests + QA Advisor PR comment.
# qlens-pytest-reporter auto-registers via pytest11 — no conftest changes.
# Counts pytest-rerunfailures retries that pass as flaky.
name: pytest + QA Advisor

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          pip install -r requirements.txt
          pip install qlens-pytest-reporter
      - run: pytest
        env:
          QLENS_API_KEY: ${{ secrets.QLENS_API_KEY }}
          QLENS_SEND_CASES: "1"   # include per-case data (default: off)

  advise:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: i-kosheliev/qa-advisor-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
